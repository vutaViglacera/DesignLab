<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details Viewer</title>
    <style>
        /* Giữ nguyên các styles từ file cũ [1-12] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .product-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }
        .product-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .product-code { font-size: 18px; font-weight: bold; color: #333; }
        .view-btn { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .product-details { display: none; padding: 20px; background-color: #fafafa; }
        .product-details.show { display: block; }
        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .detail-item { background: white; padding: 15px; border-radius: 6px; border-left: 4px solid #4CAF50; }
        .detail-label { font-weight: bold; color: #555; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
        .detail-value { color: #333; font-size: 14px; word-break: break-word; }
        .image-link { display: inline-block; padding: 8px 12px; background-color: #f0f0f0; border-radius: 4px; text-decoration: none; color: #4CAF50; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal.show { display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 10px; border-radius: 8px; max-width: 90%; }
        .close-btn { float: right; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom: 30px; color: #333;">Product Catalog</h1>
        <div id="products-container"></div>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeImageModal()">&times;</span>
            <div class="modal-body">
                <img id="modalImage" src="" style="max-width: 100%; max-height: 80vh;">
            </div>
        </div>
    </div>

    <script>
        async function loadProductData() {
            try {
                // LƯU Ý: Tên file phải khớp chính xác với file JSON của bạn [13]
                const response = await fetch('data.json'); 
                if (!response.ok) throw new Error('Không thể tải file JSON');
                
                let text = await response.text();
                // Loại bỏ các ký tự lạ (*, _) nếu chúng tồn tại trong file thực tế [24]
                let cleanedText = text.replace(/\*/g, '').replace(/_/g, '');
                const data = JSON.parse(cleanedText);
                
                renderProducts(data);
            } catch (error) {
                console.error('Lỗi:', error);
                document.getElementById('products-container').innerHTML = 
                    '<div class="empty-state">Lỗi: Hãy đảm bảo file JSON tên là "data.json" và định dạng đúng.</div>';
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            products.forEach((product, index) => {
                const card = createProductCard(product, index);
                container.appendChild(card);
            });
        }

        function createProductCard(product, index) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-header">
                    <div class="product-code">${product['Factory code'] || 'N/A'}</div>
                    <button class="view-btn" onclick="toggleDetails(${index})">Xem chi tiết</button>
                </div>
                <div class="product-details" id="details-${index}">
                    ${createDetailsHTML(product)}
                </div>
            `;
            return card;
        }

        function createDetailsHTML(product) {
            const fields = [
                { label: 'Kích thước', key: 'Size' },
                { label: 'Bề mặt', key: 'Surface' },
                { label: 'Màu sắc', key: 'Color' },
                { label: 'Tên sản phẩm', key: 'Product Name' },
                { label: 'Trạng thái', key: 'Status' },
                { label: 'Thư mục Drive', key: 'Link Url Drive folder', isLink: true },
                { label: 'Hình ảnh', key: 'Link url face', isLink: true, isImage: true }
            ];

            let html = '<div class="details-grid">';
            fields.forEach(field => {
                let value = product[field.key] || '';
                
                // Kiểm tra dữ liệu rác từ nguồn [24-26]
                const isInvalid = !value || value === "#ERROR!" || value === "Không tìm thấy link";
                
                html += `<div class="detail-item">
                    <div class="detail-label">${field.label}</div>
                    <div class="detail-value">`;

                if (isInvalid) {
                    html += '<span style="color: #ccc;">N/A</span>';
                } else if (field.isLink) {
                    if (field.isImage && product['link google'] && product['link google'] !== "#ERROR!") {
                        html += `<a class="image-link" href="javascript:void(0)" onclick="openImageModal('${product['link google']}')">Xem ảnh</a>`;
                    } else if (value.startsWith('http')) {
                        html += `<a class="image-link" href="${value}" target="_blank">Mở liên kết</a>`;
                    } else {
                        html += value;
                    }
                } else {
                    html += value;
                }
                html += `</div></div>`;
            });
            return html + '</div>';
        }

        function toggleDetails(index) {
            document.getElementById(`details-${index}`).classList.toggle('show');
        }

        function openImageModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            document.getElementById('modalImage').src = imageUrl;
            modal.classList.add('show');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
        }

        window.addEventListener('load', loadProductData);
    </script>
</body>
</html>
